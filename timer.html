<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="A beautiful Glassmorphism Timer App with session history.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Glass Timer">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <title>Glass Timer</title>
    <!--
        Asset loading — built to render correctly even when a network/tunnel
        SILENTLY blocks a CDN (e.g. returns a 200 "block page" or hangs):

          • Fonts: self-hosted locally (vendor/fonts.css). No font CDN at all,
            so an onerror-based fallback can't be defeated by a 200 block page.

          • Tailwind: CDN-first with a hardened fallback. The Play CDN is loaded
            ASYNCHRONOUSLY so a blocked/hung request can never freeze the page.
            We swap to the precompiled vendor/tailwind.css if the CDN errors,
            loads but is unusable (no `tailwind` global → e.g. a block page), or
            never initializes within a short timeout (a hung request).

        The service worker precaches every vendor/* asset for offline use.
    -->
    <link rel="stylesheet" href="vendor/fonts.css">
    <script>
        // Shared theme config for the Tailwind Play CDN runtime.
        const TAILWIND_CONFIG = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        glass: {
                            100: 'rgba(255, 255, 255, 0.1)',
                            200: 'rgba(255, 255, 255, 0.2)',
                            300: 'rgba(255, 255, 255, 0.3)',
                        }
                    },
                    animation: {
                        blob: "blob 7s infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        };

        (function () {
            let localLoaded = false;

            // Load the precompiled, vendored Tailwind build (idempotent, and a
            // no-op if the CDN already initialized successfully).
            function loadLocalTailwind() {
                if (localLoaded || typeof tailwind !== 'undefined') return;
                localLoaded = true;
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'vendor/tailwind.css';
                document.head.appendChild(link);
            }

            // Async so a blocked/hung CDN request never blocks page rendering.
            const s = document.createElement('script');
            s.src = 'https://cdn.tailwindcss.com';
            s.async = true;
            s.onload = () => {
                if (typeof tailwind !== 'undefined') {
                    tailwind.config = TAILWIND_CONFIG;   // CDN healthy
                } else {
                    loadLocalTailwind();                 // loaded but unusable (block page)
                }
            };
            s.onerror = loadLocalTailwind;               // hard network failure
            document.head.appendChild(s);

            // Hung / very slow CDN: fall back if it hasn't initialized in time.
            setTimeout(loadLocalTailwind, 1200);
        })();
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            /* Mobile browser dynamic view height support */
            min-height: 100dvh;
            padding-top: env(safe-area-inset-top, 1rem);
            padding-bottom: env(safe-area-inset-bottom, 1rem);
            padding-left: env(safe-area-inset-left, 1rem);
            padding-right: env(safe-area-inset-right, 1rem);
        }

        /* Custom Scrollbar for the history list */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        /* Hardware acceleration for smooth animations */
        .animate-blob {
            will-change: transform;
        }

        /* Offset the second blob so the two animate out of sync */
        .animation-delay-2000 {
            animation-delay: 2s;
        }

        /* Prevent tap zoom on buttons */
        button {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body
    class="flex flex-col items-center justify-center p-4 text-white font-sans selection:bg-pink-500 selection:text-white">

    <div class="w-full max-w-md flex flex-col gap-6">
        <!-- Main Timer Card -->
        <div
            class="glass-card rounded-2xl p-6 sm:p-8 relative overflow-hidden group transition-all duration-300 hover:shadow-2xl">
            <!-- Decorative circle behind -->
            <div
                class="absolute -top-10 -right-10 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob">
            </div>
            <div
                class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-2000">
            </div>

            <h1 class="text-xl sm:text-2xl font-semibold text-center mb-1 tracking-wide text-white/90">Work Session</h1>
            <p class="text-center text-white/50 text-xs sm:text-sm mb-6 sm:mb-8">Focus Timer</p>

            <!-- Timer Display -->
            <div class="text-center mb-8 sm:mb-10 relative z-10 mx-auto">
                <div id="timer-display" role="timer" aria-label="Elapsed time"
                    class="font-mono text-5xl sm:text-6xl md:text-7xl font-bold tracking-tighter text-white drop-shadow-lg tabular-nums">
                    00:00:00<span class="text-xl sm:text-2xl md:text-3xl text-white/60">.00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-wrap justify-center gap-3 sm:gap-4 relative z-10">
                <button id="reset-btn"
                    class="flex-1 sm:flex-none px-4 sm:px-6 py-3 rounded-xl bg-white/10 hover:bg-white/20 hover:scale-105 active:scale-95 transition-all duration-200 border border-white/10 backdrop-blur-sm text-sm font-medium tracking-wide">
                    RESET
                </button>
                <button id="toggle-btn"
                    class="flex-[2] sm:flex-none px-6 sm:px-8 py-3 rounded-xl bg-gradient-to-r from-emerald-400 to-teal-500 hover:from-emerald-300 hover:to-teal-400 hover:shadow-lg hover:shadow-emerald-500/30 hover:scale-105 active:scale-95 transition-all duration-200 font-bold tracking-wide shadow-md text-white min-w-[120px]">
                    START
                </button>
                <button id="save-btn"
                    class="flex-1 sm:flex-none px-4 sm:px-6 py-3 rounded-xl bg-white/10 hover:bg-white/20 hover:scale-105 active:scale-95 transition-all duration-200 border border-white/10 backdrop-blur-sm text-sm font-medium tracking-wide"
                    disabled>
                    SAVE
                </button>
            </div>
        </div>

        <!-- History Card -->
        <div class="glass-card rounded-2xl p-5 sm:p-6 h-72 sm:h-80 flex flex-col">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-white/10">
                <h2 class="text-base sm:text-lg font-semibold tracking-wide flex items-center gap-2">
                    <svg class="w-4 h-4 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Past Sessions
                </h2>
                <span id="session-count" class="text-xs font-mono bg-white/10 px-2 py-1 rounded text-white/70">0</span>
            </div>

            <!-- Empty state / session list rendered by renderHistory() -->
            <div id="history-list" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2"></div>
        </div>
    </div>

    <!-- Notification Toast (Hidden by default) -->
    <div id="toast"
        class="fixed bottom-5 left-1/2 transform -translate-x-1/2 glass-card px-6 py-3 rounded-full text-sm font-medium opacity-0 translate-y-10 transition-all duration-300 pointer-events-none z-50 flex items-center gap-2 w-max max-w-[90vw]">
        <svg class="w-4 h-4 text-emerald-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span>Session Saved successfully</span>
    </div>

    <script>
        /**
         * IndexedDB Wrapper Class
         */
        class DBManager {
            constructor(dbName = 'TimerAppDB', version = 1) {
                this.dbName = dbName;
                this.version = version;
                this.db = null;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('sessions')) {
                            db.createObjectStore('sessions', { keyPath: 'id', autoIncrement: true });
                        }
                        if (!db.objectStoreNames.contains('appState')) {
                            db.createObjectStore('appState', { keyPath: 'key' });
                        }
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this);
                    };

                    request.onerror = (event) => {
                        console.error('Database error:', event.target.error);
                        reject(event.target.error);
                    };
                });
            }

            async saveSession(duration) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['sessions'], 'readwrite');
                    const store = transaction.objectStore('sessions');
                    const session = {
                        timestamp: Date.now(),
                        duration: duration,
                        label: 'Work Session' // Default label
                    };
                    const request = store.add(session);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getSessions() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['sessions'], 'readonly');
                    const store = transaction.objectStore('sessions');
                    const request = store.getAll(); // Get all sessions

                    request.onsuccess = () => {
                        // Sort locally (descending by timestamp)
                        const sorted = request.result.sort((a, b) => b.timestamp - a.timestamp);
                        resolve(sorted);
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            async saveState(state) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['appState'], 'readwrite');
                    const store = transaction.objectStore('appState');
                    const request = store.put({ key: 'runningState', ...state });

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async getState() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['appState'], 'readonly');
                    const store = transaction.objectStore('appState');
                    const request = store.get('runningState');

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
        }

        /**
         * Timer Engine Class
         */
        class TimerEngine {
            constructor(onTick) {
                this.startTime = 0;
                this.elapsedBeforeStart = 0;
                this.isRunning = false;
                this.rAFId = null;
                this.onTick = onTick;
            }

            start() {
                if (this.isRunning) return;

                this.isRunning = true;
                this.startTime = Date.now();

                const loop = () => {
                    this.onTick(this.getElapsedTime());
                    this.rAFId = requestAnimationFrame(loop);
                };
                this.rAFId = requestAnimationFrame(loop);
            }

            pause() {
                if (!this.isRunning) return;

                this.isRunning = false;
                cancelAnimationFrame(this.rAFId);
                this.elapsedBeforeStart += Date.now() - this.startTime;
                this.onTick(this.getElapsedTime()); // One last update
            }

            reset() {
                this.isRunning = false;
                cancelAnimationFrame(this.rAFId);
                this.startTime = 0;
                this.elapsedBeforeStart = 0;
                this.onTick(0);
            }

            getElapsedTime() {
                if (this.isRunning) {
                    return (Date.now() - this.startTime) + this.elapsedBeforeStart;
                }
                return this.elapsedBeforeStart;
            }

            // Restore from persisted state
            loadState(state) {
                if (!state) return;

                this.elapsedBeforeStart = state.elapsedBeforeStart || 0;

                if (state.isRunning) {
                    this.startTime = state.startTime || Date.now();
                    this.isRunning = true;
                    // Resume immediately
                    const loop = () => {
                        this.onTick(this.getElapsedTime());
                        this.rAFId = requestAnimationFrame(loop);
                    };
                    this.rAFId = requestAnimationFrame(loop);
                } else {
                    this.isRunning = false;
                    this.onTick(this.elapsedBeforeStart);
                }
            }

            getStateSnapshot() {
                return {
                    isRunning: this.isRunning,
                    startTime: this.startTime,
                    elapsedBeforeStart: this.elapsedBeforeStart
                };
            }
        }

        /**
         * Main Application Controller
         */
        class App {
            constructor() {
                this.db = new DBManager();
                this.timer = new TimerEngine(this.updateTimerUI.bind(this));

                // Guards a saved-but-unchanged session from being recorded twice.
                this.saved = false;

                // Elements
                this.displayEl = document.getElementById('timer-display');
                this.toggleBtn = document.getElementById('toggle-btn');
                this.resetBtn = document.getElementById('reset-btn');
                this.saveBtn = document.getElementById('save-btn');
                this.historyListEl = document.getElementById('history-list');
                this.sessionCountEl = document.getElementById('session-count');
                this.toastEl = document.getElementById('toast');

                this.init();
            }

            async init() {
                await this.db.init();
                this.bindEvents();
                this.renderHistory();
                this.checkForPersistedState();

                // Visibility API to handle tab switching/background throttling gracefully if needed
                // (Though rAF + Date.now delta handles accurate timing automatically)
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        this.saveCurrentState();
                    }
                });

                // Periodic save for crash recovery (every 1s if running)
                setInterval(() => {
                    if (this.timer.isRunning) {
                        this.saveCurrentState();
                    }
                }, 1000);
            }

            bindEvents() {
                this.toggleBtn.addEventListener('click', () => {
                    if (this.timer.isRunning) {
                        this.pause();
                    } else {
                        this.start();
                    }
                });

                this.resetBtn.addEventListener('click', () => this.reset());
                this.saveBtn.addEventListener('click', () => this.saveSession());

                // Save state on unload
                window.addEventListener('beforeunload', () => {
                    this.saveCurrentState();
                });
            }

            start() {
                this.saved = false; // new time accruing — allow saving again
                this.timer.start();
                this.updateControls(true);
                this.saveCurrentState();
            }

            pause() {
                this.timer.pause();
                this.updateControls(false);
                this.saveCurrentState();
            }

            reset() {
                this.saved = false;
                this.timer.reset();
                this.updateControls(false);
                this.saveCurrentState();
            }

            async saveSession() {
                const duration = this.timer.getElapsedTime();
                if (duration === 0 || this.saved) return;

                await this.db.saveSession(duration);
                this.saved = true; // block duplicate saves until time changes
                this.showToast();
                this.renderHistory();

                // Disable Save until the timer is restarted or reset.
                this.saveBtn.disabled = true;
                this.saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            saveCurrentState() {
                const state = this.timer.getStateSnapshot();
                this.db.saveState(state);
            }

            async checkForPersistedState() {
                const state = await this.db.getState();
                if (state) {
                    this.timer.loadState(state);
                    this.updateControls(this.timer.isRunning);
                }
            }

            // Single source of truth for the empty-history placeholder.
            emptyStateHTML() {
                return `
                    <div class="h-full flex flex-col items-center justify-center text-white/30 space-y-2">
                        <svg class="w-8 h-8 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <span class="text-sm">No recorded sessions yet</span>
                    </div>`;
            }

            // Escape user-facing strings before interpolating into innerHTML.
            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str ?? '';
                return div.innerHTML;
            }

            async renderHistory() {
                const sessions = await this.db.getSessions();
                this.sessionCountEl.textContent = sessions.length;

                if (sessions.length === 0) {
                    this.historyListEl.innerHTML = this.emptyStateHTML();
                    return;
                }

                this.historyListEl.innerHTML = sessions.map(session => {
                    const date = new Date(session.timestamp);
                    const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const dateStr = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                    const durationStr = this.formatTime(session.duration, false); // No millis in history
                    const label = this.escapeHtml(session.label);

                    return `
                        <div class="p-3 bg-white/5 hover:bg-white/10 rounded-lg flex justify-between items-center group transition-colors border border-transparent hover:border-white/10">
                            <div class="flex flex-col">
                                <span class="text-xs text-white/50 font-medium">${dateStr} • ${timeStr}</span>
                                <span class="font-medium text-white/90">${label}</span>
                            </div>
                            <span class="font-mono text-lg font-bold text-emerald-300">${durationStr}</span>
                        </div>
                    `;
                }).join('');
            }

            updateControls(isRunning) {
                // Toggle Button State
                if (isRunning) {
                    this.toggleBtn.textContent = 'PAUSE';
                    this.toggleBtn.classList.remove('from-emerald-400', 'to-teal-500', 'hover:shadow-emerald-500/30');
                    this.toggleBtn.classList.add('from-amber-400', 'to-orange-500', 'hover:shadow-amber-500/30');

                    this.saveBtn.disabled = true;
                    this.saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    this.toggleBtn.textContent = 'START';
                    this.toggleBtn.classList.add('from-emerald-400', 'to-teal-500', 'hover:shadow-emerald-500/30');
                    this.toggleBtn.classList.remove('from-amber-400', 'to-orange-500', 'hover:shadow-amber-500/30');

                    // Enable save if there is time and it hasn't already been saved
                    if (this.timer.getElapsedTime() > 0 && !this.saved) {
                        this.saveBtn.disabled = false;
                        this.saveBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    } else {
                        this.saveBtn.disabled = true;
                        this.saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    }
                }
            }

            updateTimerUI(elapsedMs) {
                // Update toggle button availability on reset
                if (elapsedMs === 0 && !this.timer.isRunning) {
                    this.saveBtn.disabled = true;
                    this.saveBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }

                this.displayEl.innerHTML = this.formatTimeHTML(elapsedMs);
            }

            formatTime(ms, includeMillis = true) {
                const hours = Math.floor(ms / 3600000);
                const minutes = Math.floor((ms % 3600000) / 60000);
                const seconds = Math.floor((ms % 60000) / 1000);

                const h = hours.toString().padStart(2, '0');
                const m = minutes.toString().padStart(2, '0');
                const s = seconds.toString().padStart(2, '0');

                if (!includeMillis) return `${h}:${m}:${s}`;

                const millis = Math.floor((ms % 1000) / 10);
                const msStr = millis.toString().padStart(2, '0');
                return `${h}:${m}:${s}.${msStr}`;
            }

            formatTimeHTML(ms) {
                const hours = Math.floor(ms / 3600000);
                const minutes = Math.floor((ms % 3600000) / 60000);
                const seconds = Math.floor((ms % 60000) / 1000);

                const h = hours.toString().padStart(2, '0');
                const m = minutes.toString().padStart(2, '0');
                const s = seconds.toString().padStart(2, '0');

                const millis = Math.floor((ms % 1000) / 10);
                const msStr = millis.toString().padStart(2, '0');

                return `${h}:${m}:${s}<span class="text-xl sm:text-2xl md:text-3xl text-white/60">.${msStr}</span>`;
            }

            showToast() {
                this.toastEl.classList.remove('translate-y-10', 'opacity-0');
                setTimeout(() => {
                    this.toastEl.classList.add('translate-y-10', 'opacity-0');
                }, 3000);
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            const app = new App();
        });

        // Register service worker for PWA offline support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>

</html>
