<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Glass circle -->
  <circle cx="256" cy="272" r="160" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="6"/>
  <!-- Clock ticks -->
  <line x1="256" y1="128" x2="256" y2="152" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="392" x2="256" y2="416" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="112" y1="272" x2="136" y2="272" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="376" y1="272" x2="400" y2="272" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="272" x2="256" y2="168" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Hour hand (pointing to ~4 o'clock) -->
  <line x1="256" y1="272" x2="316" y2="316" stroke="url(#hand)" stroke-width="10" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="272" r="10" fill="white"/>
  <!-- Crown/stem -->
  <rect x="228" y="96" width="56" height="18" rx="9" fill="rgba(255,255,255,0.6)"/>
</svg>
